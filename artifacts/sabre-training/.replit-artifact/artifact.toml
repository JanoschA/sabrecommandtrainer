kind = "web"
previewPath = "/"
title = "Säbelfecht Training"
version = "1.0.0"
id = "artifacts/sabre-training"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21212

[services.development]
run = "pnpm --filter @workspace/sabre-training run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sabre-training", "run", "build" ]
publicDir = "artifacts/sabre-training/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21212"
BASE_PATH = "/"
