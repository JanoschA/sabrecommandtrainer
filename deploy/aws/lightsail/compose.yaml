services:
  app:
    container_name: fechttrainer-app
    image: ${APP_IMAGE:?APP_IMAGE is required}
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      STATIC_DIR: /app/artifacts/sabre-training/dist/public
    ports:
      - "80:3000"
    restart: unless-stopped
